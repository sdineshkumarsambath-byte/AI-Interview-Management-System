<!DOCTYPE html>
<html>
<head>
    <title>My Result</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 20px;
        }

        .box {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .result-box {
            padding: 15px;
            border-radius: 8px;
            background: #eef2ff;
        }

        p {
            font-size: 16px;
            margin: 8px 0;
        }

        .error {
            color: red;
            text-align: center;
        }

        .btn {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            background: #4f46e5;
            color: white;
            padding: 10px;
            border-radius: 5px;
        }
    </style>

</head>

<body>

<div class="box">

    <h2>📊 My Interview Result</h2>

    {% if result %}

    <div class="result-box">

        <p><b>Name:</b> {{ result.resume.name }}</p>

        <p><b>Email:</b> {{ result.resume.email }}</p>

        <p><b>Score:</b> {{ result.score }}</p>

        <p><b>Status:</b> {{ result.status }}</p>

    </div>

    {% else %}

    <p class="error">No Result Found</p>

    {% endif %}

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <a href="{% url 'home' %}" class="btn">🏠 Back to Dashboard</a>

</div>

</body>
</html>
