<!DOCTYPE html>
<html>
<head>
    <title>Add Candidate</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
            margin:0;
            padding:0;
        }

        .navbar{
            background:#2c3e50;
            color:white;
            padding:15px;
            text-align:center;
            font-size:24px;
            font-weight:bold;
        }

        .container{
            width:500px;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            color:#2c3e50;
        }

        input, textarea{
            width:100%;
            padding:12px;
            margin-top:8px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:8px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            background:#3498db;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#2980b9;
        }

        .home-btn{
            display:block;
            text-align:center;
            margin-top:15px;
            text-decoration:none;
            background:#2ecc71;
            color:white;
            padding:10px;
            border-radius:8px;
        }
    </style>
</head>
<body>

<div class="navbar">
    🤖 AI Interview Management System
</div>

<div class="container">

    <h2>Add Candidate</h2>

    <form method="POST">
        {% csrf_token %}

        <label>Name</label>
        <input type="text" name="name" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Department</label>
        <input type="text" name="department" required>

        <label>Skills</label>
        <textarea name="skills" rows="4"></textarea>

        <button type="submit">
            Save Candidate
        </button>
    </form>

    <a href="{% url 'home' %}" class="home-btn">
        🏠 Back To Home
    </a>

</div>

</body>
</html>
