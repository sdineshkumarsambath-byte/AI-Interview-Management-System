<!DOCTYPE html>
<html>
<head>
    <title>Upload Resume | AI Interview System</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:linear-gradient(135deg,#667eea,#764ba2);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:500px;
            background:white;
            padding:35px;
            border-radius:20px;
            box-shadow:0px 10px 30px rgba(0,0,0,0.3);
        }

        h2{
            text-align:center;
            color:#2c3e50;
            margin-bottom:25px;
        }

        p{
            margin-bottom:12px;
        }

        label{
            font-weight:bold;
            display:block;
            margin-bottom:5px;
            color:#2c3e50;
        }

        input[type="text"],
        input[type="email"],
        input[type="file"]{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
        }

        .btn{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            color:white;
            font-size:16px;
            margin-top:10px;
        }

        .upload-btn{
            background:#27ae60;
        }

        .upload-btn:hover{
            background:#219150;
        }

        .home-btn{
            background:#3498db;
            text-decoration:none;
            display:block;
            text-align:center;
            line-height:45px;
            height:45px;
        }

        .home-btn:hover{
            background:#2980b9;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>📄 Upload Resume</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <p>
            <label>Name</label>
            {{ form.name }}
        </p>

        <p>
            <label>Email</label>
            {{ form.email }}
        </p>

        <p>
            <label>Resume File</label>
            {{ form.file }}
        </p>

        <button type="submit" class="btn upload-btn">
            🚀 Start Interview
        </button>
    </form>

    <a href="{% url 'home' %}" class="btn home-btn">
        🏠 Back To Dashboard
    </a>

</div>

</body>
</html>
