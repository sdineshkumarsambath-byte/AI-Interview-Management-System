<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Interview System Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4e54c8,#8f94fb);
}

.login-container{
    width:420px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0px 10px 30px rgba(0,0,0,0.25);
}

.logo{
    text-align:center;
    font-size:70px;
    margin-bottom:10px;
}

h2{
    text-align:center;
    color:#2c3e50;
    margin-bottom:8px;
}

.subtitle{
    text-align:center;
    color:#777;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:600;
    color:#333;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:15px;
}

input:focus{
    outline:none;
    border-color:#4e54c8;
}

.btn{
    width:100%;
    padding:14px;
    background:#4e54c8;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

.btn:hover{
    background:#3d43b4;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#777;
    font-size:14px;
}

</style>

</head>

<body>

<div class="login-container">

    <div class="logo">🤖</div>

    <h2>AI Interview System</h2>

    <p class="subtitle">
        Login to continue your interview process
    </p>

    <form method="POST">

        {% csrf_token %}

        <div class="form-group">
            <label>Username</label>
            <input
                type="text"
                name="username"
                placeholder="Enter Username"
                required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input
                type="email"
                name="email"
                placeholder="Enter Email"
                required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required>
        </div>

        <button type="submit" class="btn">
            🔐 Login
        </button>

    </form>

    <div class="footer">
        AI Powered Resume Screening & Interview Platform
    </div>

</div>

</body>

</html>
