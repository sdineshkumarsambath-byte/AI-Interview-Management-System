<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Interview System Login</title>

<style>

/* ===== BACKGROUND ===== */
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;

    background: url("https://images.unsplash.com/photo-1522071820081-009f0129c71c")
    no-repeat center center/cover;

    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* DARK OVERLAY */
body::before {
    content: "";
    position: absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.55);
}

/* LOGIN CARD */
.login-container {
    position: relative;
    width: 380px;
    padding: 35px;
    border-radius: 18px;

    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(15px);

    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    color: white;
    text-align: center;
}

/* LOGO */
.logo {
    font-size: 45px;
    margin-bottom: 10px;
}

/* TITLE */
h2 {
    margin: 10px 0;
    font-size: 26px;
}

/* INPUT */
.form-group {
    text-align: left;
    margin-top: 15px;
}

label {
    font-size: 13px;
    color: #ddd;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    border-radius: 8px;
    border: none;
    outline: none;
}

/* BUTTON */
.btn {
    width: 100%;
    padding: 12px;
    margin-top: 20px;

    background: linear-gradient(135deg,#4f46e5,#06b6d4);
    border: none;
    border-radius: 10px;

    color: white;
    font-size: 16px;
    cursor: pointer;

    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.03);
}

/* SUBTITLE */
.subtitle {
    font-size: 14px;
    opacity: 0.8;
}

.footer {
    margin-top: 15px;
    font-size: 12px;
    opacity: 0.7;
}

</style>

</head>

<body>

<div class="login-container">

    <div class="logo">🤖</div>

    <h2>AI Interview management System</h2>

    <p class="subtitle">
        Login to continue your interview process
    </p>

    <form method="POST">

        {% csrf_token %}

        <div class="form-group">
            <label>Username</label>
            <input
                type="text"
                name="username"
                placeholder="Enter Username"
                required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input
                type="email"
                name="email"
                placeholder="Enter Email"
                required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required>
        </div>

        <button type="submit" class="btn">
            🔐 Login
        </button>

    </form>

    <div class="footer">
        AI Powered Resume Screening & Interview Platform
    </div>

</div>

</body>

</html>
